<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Video Processor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h1>🎥 MICPL </h1>
    <p class="subtitle">Upload a video and visualize model predictions</p>

    <div class="card">

        <div class="upload-area" id="uploadArea">
            <p id="uploadText">Drag & drop a video or click to select</p>
            <input type="file" id="fileInput" accept="video/*" hidden>
        </div>

        <button id="uploadBtn" onclick="uploadVideo()">Upload & Process</button>

        <div class="status-box">
            <div id="status">Idle</div>
            <div class="progress-bar">
                <div id="progress"></div>
            </div>
        </div>

    </div>

    <div class="output-card">
        <h2>Output</h2>
        <video id="outputVideo" controls></video>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
